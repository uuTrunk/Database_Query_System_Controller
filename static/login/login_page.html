<style>
:root {
    --text-main: #202124;
    --text-sub: #5f6368;
}

html, body {
    border: 0;
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: transparent;
}

body,
#pywebio-scope,
.webio-session,
.pywebio,
.pywebio-scope,
.container,
.container-fluid,
.row,
.col-xs-1,
.col-xs-2,
.col-xs-3,
.col-xs-4,
.col-xs-5,
.col-xs-6,
.col-xs-7,
.col-xs-8,
.col-xs-9,
.col-xs-10,
.col-xs-11,
.col-xs-12,
.panel,
.panel-body,
.panel-default {
    background: transparent !important;
}

.webio-input-group,
.input-group,
.input-group-addon,
.form-group,
.form-control-label,
.control-label,
.help-block,
.clearfix,
.form-control,
.form-control:focus {
    background: transparent !important;
}

#pywebio-scope * {
    background-color: transparent;
}

#pywebio-scope .btn,
#pywebio-scope .btn *,
#pywebio-scope .btn-primary,
#pywebio-scope .btn-primary * {
    background: transparent;
}

.webio-input-group {
    width: min(92vw, 404px);
    margin: 10px auto 0 !important;
    padding: 0 !important;
    border: 0 !important;
    box-shadow: none !important;
}

.webio-input-group .control-label {
    text-align: left;
    color: var(--text-sub);
    font-size: 12px;
    line-height: 18px;
    font-weight: 500;
    margin: 0 0 6px;
    padding-left: 14px;
}

.webio-input-group .form-group {
    margin-bottom: 14px;
}

.form-control {
    /* border: 1px solid #dadce0; */
    border-radius: 24px;
    color: var(--text-main);
    height: 44px;
    width: 100% !important;
    padding: 10px 14px;
    font-size: 14px;
    box-shadow: none !important;
    transition: border-color 0.18s ease, background-color 0.18s ease;
}

.form-control::placeholder {
    color: #9aa0a6;
}

.form-control:focus {
    border-color: #1a73e8;
}

.login-wrap {
    border: 0;
    max-width: 460px;
    margin: 8vh auto 0;
    padding: 0 18px;
    text-align: center;
}

.logo-line {
    border: 0;
    font-size: 240px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin: 0 0 10px;
}

.c-blue { color: #1a73e8; }
.c-red { color: #ea4335; }
.c-yellow { color: #fbbc05; }
.c-green { color: #34a853; }

.webio-input-group .btn,
.webio-input-group .btn-primary {
    display: block;
    width: min(92vw, 404px);
    margin: 2px auto 0;
    background: transparent !important;
    border: 0 !important;
    border-radius: 999px !important;
    color: #1a73e8 !important;
    min-height: 42px;
    padding: 9px 22px !important;
    font-size: 14px;
    font-weight: 600;
    line-height: 20px;
    box-shadow: none !important;
    transition: color 0.18s ease, opacity 0.18s ease, transform 0.08s ease;
}

.webio-input-group .btn:hover,
.webio-input-group .btn-primary:hover {
    background: transparent !important;
    opacity: 0.82;
}

.webio-input-group .btn:active,
.webio-input-group .btn-primary:active {
    transform: translateY(1px);
}

.webio-input-group .btn:focus,
.webio-input-group .btn-primary:focus {
    outline: none;
    box-shadow: none !important;
}

@media (max-width: 768px) {
    .login-wrap { margin-top: 5vh; }
    .logo-line { font-size: 112px; }
}

</style>

<div class="login-wrap">
    <h1 class="logo-line">
        <span class="c-blue">D</span><span class="c-red">a</span><span class="c-yellow">t</span><span class="c-blue">a</span>
        <span class="c-green">C</span><span class="c-red">o</span><span class="c-yellow">p</span><span class="c-blue">i</span><span class="c-green">l</span><span class="c-red">o</span><span class="c-blue">t</span>
    </h1>
</div>
