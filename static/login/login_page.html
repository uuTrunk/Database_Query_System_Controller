<style>
:root {
    --bg-top: #eef4ff;
    --bg-bottom: #f8fafc;
    --card-bg: rgba(255, 255, 255, 0.78);
    --card-border: rgba(148, 163, 184, 0.24);
    --text-main: #0f172a;
    --text-sub: #64748b;
    --brand: #3b82f6;
    --brand-soft: #dbeafe;
    --input-border: #cbd5e1;
    --input-focus: #60a5fa;
}

html,
body {
    border: 0;
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: "Manrope", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text-main);
}

body,
#pywebio-scope,
.webio-session,
.pywebio,
.pywebio-scope,
.container,
.container-fluid,
.row,
.col-xs-1,
.col-xs-2,
.col-xs-3,
.col-xs-4,
.col-xs-5,
.col-xs-6,
.col-xs-7,
.col-xs-8,
.col-xs-9,
.col-xs-10,
.col-xs-11,
.col-xs-12,
.panel,
.panel-body,
.panel-default {
    background: transparent !important;
}

#pywebio-scope {
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    background:
        radial-gradient(56rem 56rem at 8% -6%, #dbeafe 0%, rgba(219, 234, 254, 0) 62%),
        radial-gradient(42rem 42rem at 100% 10%, #e2e8f0 0%, rgba(226, 232, 240, 0) 65%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 70%);
}

#pywebio-scope::before,
#pywebio-scope::after {
    content: "";
    position: absolute;
    pointer-events: none;
    border-radius: 999px;
    filter: blur(1px);
}

#pywebio-scope::before {
    width: 260px;
    height: 260px;
    background: rgba(59, 130, 246, 0.12);
    top: 12vh;
    right: -80px;
}

#pywebio-scope::after {
    width: 220px;
    height: 220px;
    background: rgba(16, 185, 129, 0.1);
    left: -70px;
    bottom: 10vh;
}

.login-shell {
    position: relative;
    z-index: 2;
    width: min(92vw, 460px);
    margin: 9vh auto 0;
    padding: 32px 26px 20px;
    border: 1px solid var(--card-border);
    border-radius: 26px;
    backdrop-filter: blur(8px);
    background: var(--card-bg);
    box-shadow: 0 22px 40px rgba(15, 23, 42, 0.09);
    text-align: center;
}

.vite-badge {
    width: fit-content;
    margin: 0 auto 14px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    line-height: 16px;
    font-weight: 700;
    color: #1d4ed8;
    background: var(--brand-soft);
    letter-spacing: 0.25px;
}

.title {
    margin: 0;
    font-size: clamp(29px, 5.5vw, 38px);
    line-height: 1.12;
    letter-spacing: -0.45px;
    font-weight: 800;
}

.title-accent {
    color: var(--brand);
}

.subtitle {
    margin: 10px auto 0;
    max-width: 340px;
    font-size: 14px;
    line-height: 22px;
    color: var(--text-sub);
}

.webio-input-group,
.input-group,
.input-group-addon,
.form-group,
.form-control-label,
.control-label,
.help-block,
.clearfix {
    background: transparent !important;
}

.webio-input-group {
    width: min(92vw, 460px);
    margin: -2px auto 0 !important;
    padding: 8px 26px 22px !important;
    border: 1px solid var(--card-border) !important;
    border-top: 0 !important;
    border-radius: 0 0 26px 26px;
    background: var(--card-bg) !important;
    backdrop-filter: blur(8px);
    box-shadow: 0 22px 40px rgba(15, 23, 42, 0.09) !important;
}

.webio-input-group .control-label {
    text-align: left;
    color: var(--text-sub);
    font-size: 12px;
    line-height: 18px;
    font-weight: 600;
    margin: 0 0 7px;
    padding-left: 4px;
}

.webio-input-group .form-group {
    margin-bottom: 14px;
}

.form-control,
.form-control:focus {
    background: #ffffff !important;
    border: 1px solid var(--input-border);
    border-radius: 14px;
    color: var(--text-main);
    height: 46px;
    width: 100% !important;
    padding: 10px 13px;
    font-size: 14px;
    box-shadow: none !important;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.form-control::placeholder {
    color: #94a3b8;
}

.form-control:focus {
    border-color: var(--input-focus);
    box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.16) !important;
}

.webio-input-group .btn,
.webio-input-group .btn-primary {
    display: block;
    width: 100%;
    margin: 6px auto 0;
    border: 0 !important;
    border-radius: 14px !important;
    min-height: 44px;
    padding: 10px 18px !important;
    font-size: 14px;
    font-weight: 700;
    line-height: 20px;
    color: #ffffff !important;
    background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%) !important;
    box-shadow: 0 10px 20px rgba(59, 130, 246, 0.28) !important;
    transition: transform 0.12s ease, opacity 0.18s ease;
}

.webio-input-group .btn:hover,
.webio-input-group .btn-primary:hover {
    opacity: 0.94;
}

.webio-input-group .btn:active,
.webio-input-group .btn-primary:active {
    transform: translateY(1px);
}

.webio-input-group .btn:focus,
.webio-input-group .btn-primary:focus {
    outline: none;
}

.footnote {
    margin-top: 14px;
    font-size: 12px;
    line-height: 18px;
    color: #94a3b8;
}

@media (max-width: 768px) {
    .login-shell {
        margin-top: 6vh;
        padding: 28px 18px 16px;
        border-radius: 22px;
    }

    .webio-input-group {
        padding: 8px 18px 18px !important;
        border-radius: 0 0 22px 22px;
    }

    .subtitle {
        font-size: 13px;
        line-height: 20px;
    }
}
</style>

<div id="app" data-v-app>
    <section class="login-shell">
        <h1 class="title">Database <span class="title-accent">Query </span>System</h1>
        <p class="subtitle">智能数据库可视化问答系统，请使用管理员账号登录后继续。</p>
        <p class="footnote">登录表单由后端安全校验，页面仅负责展示。</p>
    </section>
</div>
